<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enzo Lazzarato - Portfolio</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span class="logo">ENZO<span class="accent-dot">.</span></span>
            <ul class="nav-menu">
                <li><a href="#about-section">À Propos</a></li>
                <li><a href="#skills-section">Compétences</a></li>
                <li><a href="#experience-section">Expériences</a></li>
                <li><a href="#education-section">Formations</a></li>
                <li><a href="#projects-section">Projets</a></li>
            </ul>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" checked />
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </nav>

    <section id="about-section" class="fullscreen-section hero-blur-bg">
        <div class="container">
            <div class="about-glass-card">
                <div class="about-content-wrapper">
                    <div class="about-text-block">
                        <h1 id="hero-name">Loading...</h1>
                        <h2 id="hero-title" class="accent-color">Loading...</h2>
                        <p id="hero-about" class="large-text"></p>
                        <div class="contact-links" id="contact-links"></div>
                    </div>
                    <div class="about-memoji-container">
                        <div class="memoji-placeholder">
                            <img src="https://raw.githubusercontent.com/enzo-zsh/portfolio/refs/heads/main/assets/memoji-elazzarato.png?raw=true" alt="Memoji Enzo" class="memoji-image">
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="skills-section" class="fullscreen-section bg-alt">
        <div class="container">
            <h2 class="section-heading">Compétences</h2>
            <div class="skills-wrapper">
                <div class="skills-column">
                    <h3 class="column-title">Hard Skills</h3>
                    <ul id="hard-skills-list" class="minimal-list"></ul>
                </div>
                <div class="skills-column">
                    <h3 class="column-title">Soft Skills</h3>
                    <ul id="soft-skills-list" class="minimal-list"></ul>
                </div>
            </div>
        </div>
    </section>

    <section id="experience-section" class="fullscreen-section">
        <div class="container">
            <h2 class="section-heading">Expériences</h2>
            <div id="experience-list" class="timeline-container"></div>
        </div>
    </section>

    <section id="education-section" class="fullscreen-section bg-alt">
        <div class="container">
            <h2 class="section-heading">Formations</h2>
            <div id="education-list" class="grid-layout"></div>
        </div>
    </section>

    <section id="projects-section" class="fullscreen-section">
        <div class="container">
            <h2 class="section-heading">Projets Personnels</h2>
            <div id="projects-list" class="grid-layout"></div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; <span id="year"></span> Enzo Lazzarato — Ingénieur Cybersécurité</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
